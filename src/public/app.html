// ============================================
// OFFLINE AUTH CHECK
// ============================================
function isOfflineMode() {
  return localStorage.getItem("offline_mode") === "true";
}

function getCurrentUser() {
  return {
    id: localStorage.getItem("offline_user_id"),
    email: localStorage.getItem("offline_user_email"),
    nama: localStorage.getItem("offline_user_name"),
    role: localStorage.getItem("offline_user_role")
  };
}

function isMobileDevice() {
  try {
    if (navigator.userAgentData && typeof navigator.userAgentData.mobile === 'boolean') {
      return navigator.userAgentData.mobile;
    }
    return /Mobi|Android|iPhone|iPad|iPod|Windows Phone/i.test(navigator.userAgent);
  } catch (e) {
    return false;
  }
}

function canUseOfflineSync() {
  return typeof window.auth !== 'undefined' && window.auth.canUseOfflineMode();
}

function requireOfflineSyncAllowed() {
  if (!canUseOfflineSync()) {
    Swal.fire({
      icon: 'warning',
      title: 'Perangkat Tidak Diizinkan',
      text: 'Fitur sinkronisasi offline hanya tersedia untuk komputer/desktop yang disetujui. Gunakan perangkat yang telah disetujui untuk mode offline atau login secara online.',
      confirmButtonText: 'Tutup'
    });
    return false;
  }
  return true;
}

// Tampilkan indikator offline mode
function showOfflineIndicator() {
  if (isOfflineMode()) {
    var indicator = document.createElement('div');
    indicator.id = 'offlineIndicator';
    indicator.innerHTML = '<i class="fas fa-wifi-slash"></i> Mode Offline';
    indicator.style.cssText = 'position:fixed; bottom:10px; left:10px; background:#f39c12; color:#fff; padding:5px 12px; border-radius:20px; font-size:11px; z-index:9999;';
    document.body.appendChild(indicator);
  }
}

// Panggil saat DOM ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', showOfflineIndicator);
} else {
  showOfflineIndicator();
}

  // ============================================
  // TANGGAL HIJRIAH & JAM ISTIWAK (WIS)
  // ============================================
  var userCoords = { lon: 111.9972, tzOffset: 7 };
  var lokasiName = 'Pondok Pesantren Lirboyo, Kediri, Jawa Timur';

  function dapatkanTanggalHijriah(date) {
    var opsi = { day: 'numeric', month: 'long', year: 'numeric' };
    var formatter = new Intl.DateTimeFormat('id-ID-u-ca-islamic-umalqura', opsi);
    return formatter.format(date);
  }

  function hitungWaktuIstiwak(date, lon, timezoneOffset) {
    var start = new Date(date.getFullYear(), 0, 0);
    var diff = date - start;
    var oneDay = 1000 * 60 * 60 * 24;
    var dayOfYear = Math.floor(diff / oneDay);
    var B = (360 / 365) * (dayOfYear - 81);
    var B_rad = B * (Math.PI / 180);
    var eot = 9.87 * Math.sin(2 * B_rad) - 7.53 * Math.cos(B_rad) - 1.5 * Math.sin(B_rad);
    var lonStandard = timezoneOffset * 15;
    var kwd = (lonStandard - lon) * 4;
    var totalMenitLokal = (date.getHours() * 60) + date.getMinutes() + (date.getSeconds() / 60);
    var totalMenitIstiwak = totalMenitLokal - kwd + eot;
    if (totalMenitIstiwak < 0) totalMenitIstiwak += 1440;
    if (totalMenitIstiwak >= 1440) totalMenitIstiwak -= 1440;
    var jamIstiwak = Math.floor(totalMenitIstiwak / 60);
    var sisaMenit = totalMenitIstiwak % 60;
    var menitIstiwak = Math.floor(sisaMenit);
    return String(jamIstiwak).padStart(2, '0') + ':' + String(menitIstiwak).padStart(2, '0') + ' WIS';
  }

  function initFalakHeader() {
    var inputDateEl = document.getElementById('currentDate');
    var wisClockEl = document.getElementById('wisClock');
    var locationEl = document.getElementById('locationText');

    // Deteksi GPS
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(position) {
        userCoords.lon = position.coords.longitude;
        userCoords.tzOffset = -new Date().getTimezoneOffset() / 60;
        // Coba reverse geocode untuk nama lokasi
        fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + position.coords.latitude + '&lon=' + position.coords.longitude)
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data && data.address) {
              var addr = data.address;
              var parts = [addr.village || addr.hamlet || addr.suburb || '', addr.county || addr.city || addr.town || '', addr.state || ''].filter(Boolean);
              if (parts.length > 0) {
                lokasiName = parts.join(', ');
                if (locationEl) locationEl.innerHTML = '<span class="marquee-inner"><i class="fas fa-map-marker-alt"></i> ' + lokasiName + '</span>';
              }
            }
          }).catch(function() {});
      }, function(error) {
        console.log('GPS tidak aktif, menggunakan lokasi default.');
      });
    }

    // Update setiap detik
    setInterval(function() {
      var sekarang = new Date();
      if (inputDateEl) inputDateEl.innerText = dapatkanTanggalHijriah(sekarang);
      if (wisClockEl) wisClockEl.innerText = hitungWaktuIstiwak(sekarang, userCoords.lon, userCoords.tzOffset);
    }, 1000);
  }

  document.addEventListener('DOMContentLoaded', initFalakHeader);
  
  function toggleSidebar() {
    var s = document.getElementById("sidebar");
    var o = document.querySelector(".sidebar-overlay");
    if (s) s.classList.toggle("active");
    if (o) o.classList.toggle("active");
  }
  
  function toggleUserMenu() {
    var m = document.getElementById("userMenuMobile");
    if (m) {
      m.style.display = m.style.display === 'block' ? 'none' : 'block';
      setTimeout(function() { if (m) m.style.display = 'none'; }, 3000);
    }
  }
  
  document.addEventListener('click', function(e) {
    var m = document.getElementById("userMenuMobile");
    var b = document.querySelector(".user-profile-mobile");
    if (m && b && !b.contains(e.target) && !m.contains(e.target)) m.style.display = 'none';
  });
  
  function setActiveMenu(menu) {
    var menus = ['dashboard', 'produk', 'kasir', 'laporan', 'laporan-master', 'master-kelas', 'data', 'role', 'admin-devices'];
    for (var i = 0; i < menus.length; i++) {
      var el = document.getElementById('menu-' + menus[i]);
      if (el) {
        if (menus[i] === menu) el.classList.add('active');
        else el.classList.remove('active');
      }
    }
  }

  var offlineProduk = await window.localDB.getAll('produk') || [];
  var offlineTransaksi = await window.localDB.getAll('transaksi') || [];
  var offlineKelas = await window.localDB.getAll('master_kelas') || [];
  
  // Ambil data online (dari Supabase)
  var onlineProduk = [];
  var onlineTransaksi = [];
  var onlineKelas = [];
  
  if (isOnline) {
    try {
      const { data: produkData } = await sb.from('produk').select('id', { count: 'exact', head: true });
      const { count: produkCount } = await sb.from('produk').select('*', { count: 'exact', head: true });
      onlineProduk = produkCount || 0;

      onlineTransaksi = transaksiCount || 0;

        '<h3><i class="fas fa-database" style="color:#2c3e50;"></i> Data Offline (Lokal)</h3>' +
        '<p>📦 Produk: <strong>' + offlineProduk.length + '</strong> item</p>' +

        '<p>📚 Kelas: <strong>' + offlineKelas.length + '</strong> item</p>' +
      '</div>' +
      
      // Data Online (Server) - KANAN
      '<div style="background:#e8f4f8; padding:15px; border-radius:12px; border-left: 3px solid #3498db;">' +
        '<h3><i class="fas fa-cloud" style="color:#3498db;"></i> Data Online (Server)</h3>' +
        '<p>📦 Produk: <strong>' + (typeof onlineProduk === 'number' ? onlineProduk.toLocaleString() : onlineProduk) + '</strong> item</p>' +
        '<p>🧾 Transaksi: <strong>' + (typeof onlineTransaksi === 'number' ? onlineTransaksi.toLocaleString() : onlineTransaksi) + '</strong> item</p>' +
        '<p>📚 Kelas: <strong>' + (typeof onlineKelas === 'number' ? onlineKelas.toLocaleString() : onlineKelas) + '</strong> item</p>' +
        (isOnline ? '<small style="color:#27ae60;"><i class="fas fa-wifi"></i> Terhubung ke server</small>' : 
                    '<small style="color:#e74c3c;"><i class="fas fa-wifi-slash"></i> Tidak terhubung</small>') +
      '</div>' +
    '</div>' +
    
    '<div style="border-top:1px solid #eee; margin:20px 0; padding-top:20px;">' +
      '<h3><i class="fas fa-tools"></i> Aksi Manajemen Data</h3>' +
      '<div class="data-actions-grid">' +

// MANAJEMEN ROLE (CRUD USER) - DENGAN CEK OFFLINE

async function showRoleManagement() {
  if (window.currentRole !== 'admin') {
    Swal.fire({
      icon: 'warning',
      title: 'Akses Ditolak',
      text: 'Hanya admin yang dapat mengakses halaman ini.',
      confirmButtonText: 'Tutup'
    });
    return;
  }
  
  setActiveMenu('role');
  document.getElementById("pageTitle").innerHTML = '<i class="fas fa-users-cog"></i> Manajemen Role';
  
  // ========== CEK STATUS OFFLINE ==========
  var isOnline = navigator.onLine;
  
  if (!isOnline) {
    Swal.fire({
      icon: 'warning',
      title: 'Mode Offline',
      html: '<div style="text-align:left;">' +
        '<p><i class="fas fa-wifi-slash" style="color:#f39c12;"></i> <strong>Anda sedang offline!</strong></p>' +
        '<p>Manajemen Role membutuhkan koneksi internet untuk:</p>' +
        '<ul style="margin-left:20px;">' +
          '<li>Melihat daftar user</li>' +
          '<li>Menambah user baru</li>' +
          '<li>Mengedit role user</li>' +
          '<li>Menghapus user</li>' +
        '</ul>' +
        '<p>Silakan sambungkan internet dan refresh halaman.</p>' +
        '</div>',
      confirmButtonText: 'Coba Lagi',
      showCancelButton: true,
      cancelButtonText: 'Tutup'
    }).then((result) => {
      if (result.isConfirmed) {
        location.reload();
      } else {
        loadDashboard();
      }
    });
    
    // Tampilkan pesan offline di content
    document.getElementById("content").innerHTML = `
      <div class="offline-warning-card">
        <div class="offline-icon"><i class="fas fa-wifi-slash"></i></div>
        <h3>Mode Offline</h3>
        <p>Manajemen Role tidak tersedia dalam mode offline.</p>
        <p>Silakan sambungkan ke internet untuk mengakses fitur ini.</p>
        <button class="btn btn-primary" onclick="location.reload()">
          <i class="fas fa-sync-alt"></i> Coba Lagi
        </button>
        <button class="btn btn-secondary" onclick="loadDashboard()">
          <i class="fas fa-home"></i> Kembali ke Dashboard
        </button>
      </div>
    `;
    return;
  }
  
  Swal.fire({
    title: 'Memuat Data User...',
    allowOutsideClick: false,
    didOpen: function() { Swal.showLoading(); }
  });
  
  try {
    // Ambil data user dari Supabase
    var { data: users, error } = await sb.from('profiles').select('*').order('created_at', { ascending: true });
    
    Swal.close();
    
    if (error) throw error;
    
    var html = `

        <div class="card-header">
          <div class="header-left">
            <h2><i class="fas fa-users-cog"></i> Manajemen Role User</h2>
          </div>
          <div class="header-right">
            <div class="online-status-badge" style="background: #d4edda; color: #155724; border: 1px solid #c3e6cb;">
              <i class="fas fa-wifi"></i> Online - Tersambung ke server
            </div>
            <button class="btn btn-success" onclick="showAddUserForm()">
              <i class="fas fa-plus"></i> Tambah User
            </button>
          </div>
        </div>
        <p class="subtitle">Kelola hak akses user (Admin / Kasir)</p>
        
        <div class="table-responsive">
          <table class="role-table">
            <thead>
              <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Email</th>
                <th>Role</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody>
    `;
    
    for (var i = 0; i < users.length; i++) {
      var user = users[i];
      var roleBadge = user.role === 'admin' ? 
        '<span class="role-badge-admin">👑 Admin</span>' : 
        '<span class="role-badge-kasir">🛒 Kasir</span>';
      
      // Cek apakah user adalah user yang sedang login
      var currentUserId = localStorage.getItem("offline_user_id");
      var isCurrentUser = user.id === currentUserId;
      
      html += `
        <tr>
          <td>${i+1}</td>
          <td><strong>${escapeHtml(user.nama || '-')}</strong> ${isCurrentUser ? '<span class="current-user-badge">(Anda)</span>' : ''}</td>

              <i class="fas fa-edit"></i> Edit Role

        const { data: signUpData, error: signUpError } = await sb.auth.signUp({

          password: result.value.password,
          options: {
            data: {

              role: result.value.role
            }
          }
        });

        if (!signUpData.user) throw new Error('Gagal membuat user');
        
        const newUserId = signUpData.user.id;
        
        // Langkah 2: Buat profile di tabel profiles
        // Note: Karena signUp otomatis membuat user, kita perlu update/tambah profile
        const { error: profileError } = await sb
          .from('profiles')
          .upsert({

            created_at: new Date().toISOString(),
            updated_at: new Date().toISOString(),

  async function backupToLocal() {

      title: 'Backup Data ke File?',

      icon: 'question',
      showCancelButton: true,
      confirmButtonText: 'Ya, Backup',
      cancelButtonText: 'Batal'
    });
    
    if (!confirm.isConfirmed) return;
    
    Swal.fire({
      title: 'Membuat Backup...',
      allowOutsideClick: false,
      didOpen: function() { Swal.showLoading(); }
    });
    
    try {
      var backupData = {
        timestamp: new Date().toISOString(),
        data: {
          produk: await window.localDB.getAll('produk') || [],
          transaksi: await window.localDB.getAll('transaksi') || [],
          detail_transaksi: await window.localDB.getAll('detail_transaksi') || [],
          profiles: await window.localDB.getAll('profiles') || [],
          master_kelas: await window.localDB.getAll('master_kelas') || []
        }
      };
      
      var jsonStr = JSON.stringify(backupData, null, 2);
      var blob = new Blob([jsonStr], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var fileName = 'kitab_madin_backup_' + new Date().toISOString().slice(0,19).replace(/:/g, '-') + '.json';
      
      var link = document.createElement('a');
      link.href = url;
      link.download = fileName;
      link.click();
      
      URL.revokeObjectURL(url);
      
      Swal.close();
      Swal.fire({
        icon: 'success',
        title: 'Backup Berhasil!',
        html: 'File: <strong>' + fileName + '</strong><br>Ukuran: ' + (jsonStr.length / 1024).toFixed(2) + ' KB',
        confirmButtonText: 'OK'
      });
      
    } catch(error) {
      Swal.close();
      Swal.fire({ icon: 'error', title: 'Backup Gagal', text: error.message });
    }
  }
  
  async function restoreFromLocal() {
    Swal.fire({
      title: 'Pulihkan dari File Backup',
      html: '<input type="file" id="backupFile" accept=".json" style="padding:10px; border:1px solid #ddd; border-radius:8px; width:100%;">',
      showCancelButton: true,
      confirmButtonText: 'Pulihkan',
      cancelButtonText: 'Batal',
      preConfirm: function() {
        var fileInput = document.getElementById('backupFile');
        if (!fileInput.files || !fileInput.files[0]) {
          Swal.showValidationMessage('Pilih file backup terlebih dahulu!');
          return false;
        }
        return fileInput.files[0];
      }
    }).then(async function(result) {
      if (result.isConfirmed && result.value) {
        var file = result.value;
        var reader = new FileReader();
        
        reader.onload = async function(e) {
          try {
            var backupData = JSON.parse(e.target.result);
            if (!backupData.data || !backupData.data.produk) throw new Error('File backup tidak valid');
            
            var confirm2 = await Swal.fire({
              title: 'Konfirmasi Restore',
              html: '<div style="text-align:left;"><p>Data yang akan dipulihkan:</p><ul><li>📦 Produk: ' + backupData.data.produk.length + '</li><li>🧾 Transaksi: ' + backupData.data.transaksi.length + '</li></ul><p><i class="fas fa-exclamation-triangle" style="color:#f39c12;"></i> Data saat ini akan DIGANTI!</p></div>',
              icon: 'warning',
              showCancelButton: true,
              confirmButtonText: 'Ya, Pulihkan',
              cancelButtonText: 'Batal'
            });
            
            if (!confirm2.isConfirmed) return;
            
            Swal.fire({ title: 'Memulihkan Data...', allowOutsideClick: false, didOpen: function() { Swal.showLoading(); } });
            
            await window.localDB.clear('produk');
            await window.localDB.clear('transaksi');
            await window.localDB.clear('detail_transaksi');
            await window.localDB.clear('profiles');
            await window.localDB.clear('master_kelas');
            
            for (var i = 0; i < backupData.data.produk.length; i++) {
              await window.localDB.save('produk', backupData.data.produk[i], backupData.data.produk[i].id);
            }
            for (var j = 0; j < backupData.data.transaksi.length; j++) {
              await window.localDB.save('transaksi', backupData.data.transaksi[j], backupData.data.transaksi[j].id);
            }
            for (var k = 0; k < backupData.data.detail_transaksi.length; k++) {
              await window.localDB.save('detail_transaksi', backupData.data.detail_transaksi[k]);
            }
            for (var l = 0; l < backupData.data.profiles.length; l++) {
              await window.localDB.save('profiles', backupData.data.profiles[l], backupData.data.profiles[l].id);
            }
            for (var m = 0; m < backupData.data.master_kelas.length; m++) {
              await window.localDB.save('master_kelas', backupData.data.master_kelas[m], backupData.data.master_kelas[m].id);
            }
            
            Swal.close();
            Swal.fire({ icon: 'success', title: 'Restore Berhasil!', text: 'Data berhasil dipulihkan. Aplikasi akan direstart.', timer: 2000, showConfirmButton: false });
            setTimeout(function() { location.reload(); }, 2000);
            
          } catch(error) {
            Swal.close();
            Swal.fire({ icon: 'error', title: 'Restore Gagal', text: error.message });
          }
        };
        reader.readAsText(file);
      }
    });
  }
  
  async function syncToSupabase() {
    if (!navigator.onLine) {
      Swal.fire({ icon: 'warning', title: 'Tidak Ada Koneksi', text: 'Anda sedang offline.' });
      return;
    }

    if (!requireOfflineSyncAllowed()) {
      return;
    }
    
    var confirm = await Swal.fire({
      title: '⚠️ Backup Data ke Server?',
      html: '<div style="text-align:left;"><p>Data lokal Anda akan disinkronkan ke server.</p><p><strong>Yang akan disinkronkan:</strong></p><ul><li>📦 Produk</li><li>📚 Kelas</li><li>🧾 Transaksi</li></ul></div>',
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: 'Ya, Backup',
      cancelButtonText: 'Batal'
    });
    
    if (!confirm.isConfirmed) return;
    
    Swal.fire({ title: 'Menyinkronkan...', allowOutsideClick: false, didOpen: function() { Swal.showLoading(); } });
    
    try {
      var produk = await window.localDB.getAll('produk') || [];
      var kelas = await window.localDB.getAll('master_kelas') || [];
      var transaksiList = await window.localDB.getAll('transaksi') || [];
      var detailList = await window.localDB.getAll('detail_transaksi') || [];
      var syncedTransaksi = 0;
      
      var PRODUK_COLS = ['id', 'nama', 'harga_beli', 'harga_jual', 'stok', 'gambar_url', 'created_at', 'updated_at', 'deleted_at', 'synced_at'];
      for (var i = 0; i < produk.length; i++) {
        var p = produk[i];
        if (!p.id || p.id.toString().startsWith('local_')) continue;
        var cleanP = {};
        PRODUK_COLS.forEach(function(col) { if (p[col] !== undefined) cleanP[col] = p[col]; });
        await sb.from('produk').upsert(cleanP, { onConflict: 'id' });
      }
      
      for (var j = 0; j < kelas.length; j++) {
        var k = kelas[j];
        if (!k.id || k.id.toString().startsWith('kelas_')) continue;
        await sb.from('master_kelas').upsert(k, { onConflict: 'id' });
      }

      if (window.offlineCore && typeof window.offlineCore.syncTransaksiToServer === 'function') {
        for (var t = 0; t < transaksiList.length; t++) {
          var trx = transaksiList[t];
          if (trx.synced) continue;
          var detailRows = detailList.filter(function(d) { return d.transaksi_id === trx.id; });
          if (detailRows.length === 0) continue;
          var cart = detailRows.map(function(d) {
            return {
              id: d.produk_id,
              qty: d.qty,
              harga_jual: d.harga,
              harga_beli: d.harga_beli || 0
            };
          });
          var result = await window.offlineCore.syncTransaksiToServer(trx, cart);
          if (result && result.success) {
            trx.synced = true;
            if (result.serverId) trx.server_id = result.serverId;
            await window.localDB.save('transaksi', trx, trx.id);
            syncedTransaksi++;
          }
        }
      }
      
      // ========== PENTING: Download data terbaru dari server ke local cache ==========
      // Setelah upload, sync kembali data server ke IndexedDB agar UI menampilkan data terbaru
      Swal.close();
      Swal.fire({ title: 'Mengunduh data terbaru...', allowOutsideClick: false, didOpen: function() { Swal.showLoading(); } });
      
      try {
        // Download semua produk terbaru dari server (with kelas associations)
        const { data: allProduk } = await window.syncManager.fetchProdukWithKelas('*');
        if (allProduk && allProduk.length > 0) {
          for (var p of allProduk) {
            await window.localDB.save('produk', p, p.id);
          }
          console.log('✅ Produk updated dari server:', allProduk.length);
        }

        // Download semua kelas terbaru dari server
        const { data: allKelas } = await sb.from('master_kelas').select('*');
        if (allKelas && allKelas.length > 0) {
          for (var k of allKelas) {
            await window.localDB.save('master_kelas', k, k.id);
          }
          console.log('✅ Kelas updated dari server:', allKelas.length);
        }
      } catch(downloadError) {
        console.warn('⚠️ Gagal download data terbaru, akan lanjut reload:', downloadError);
      }
      
      Swal.close();
      const now = new Date().toISOString();
      localStorage.setItem('last_sync_produk', now);
      localStorage.setItem('last_sync_kelas', now);
      localStorage.setItem('last_sync_transaksi', now);
      localStorage.setItem('last_full_sync', now);
      localStorage.removeItem('pending_updates');

      Swal.fire({
        icon: 'success',
        title: 'Backup Selesai!',
        html: 'Data berhasil disinkronkan ke server.<br>Produk: ' + produk.length + '<br>Kelas: ' + kelas.length + '<br>Transaksi tersinkron: ' + syncedTransaksi,
        timer: 2000,
        showConfirmButton: false
      });
      
      setTimeout(function() { location.reload(); }, 2000);
      
    } catch(error) {
      Swal.close();
      Swal.fire({ icon: 'error', title: 'Gagal', text: error.message || 'Terjadi kesalahan saat sinkronisasi.' });
    }
  }

    allowOutsideClick: false,

  try {

    var currentUserId = localStorage.getItem("offline_user_id");

    // Unduh produk (with kelas associations)

    for (var i = 0; i < produkData.length; i++) {
      await window.localDB.save('produk', produkData[i], produkData[i].id);
    }
    
    // Unduh kelas

    for (var j = 0; j < kelasData.length; j++) {

    // Kembalikan role user yang login

  async function fullResetAndDownload() {
  if (!navigator.onLine) {
    Swal.fire({
      icon: 'warning',
      title: 'Tidak Ada Koneksi',
      text: 'Anda sedang offline. Sambungkan internet terlebih dahulu.',
      confirmButtonText: 'Tutup'
    });
    return;
  }

  if (!requireOfflineSyncAllowed()) {
    return;
  }
  
  var confirm = await Swal.fire({
    title: '⚠️ RESET TOTAL & UNDUH ULANG',
    html: '<div style="text-align:left;">' +
      '<p><i class="fas fa-exclamation-triangle" style="color:#e74c3c;"></i> <strong>PERINGATAN BERAT!</strong></p>' +
      '<p>Tindakan ini akan:</p>' +
      '<ul>' +
        '<li>✅ Menghapus SEMUA data offline</li>' +
        '<li>✅ Mengunduh ULANG data dari server</li>' +
        '<li>✅ Mempertahankan role user Anda</li>' +
      '</ul>' +
      '<hr>' +
      '<p>Ketik <strong>"RESET"</strong> untuk konfirmasi:</p>' +
      '<input type="text" id="confirmText" placeholder="Ketik RESET" style="width:100%; padding:8px; margin-top:5px; border:1px solid #ddd; border-radius:8px;">' +
      '</div>',
    icon: 'error',
    showCancelButton: true,
    confirmButtonText: 'Ya, Reset Total',
    cancelButtonText: 'Batal',
    confirmButtonColor: '#e74c3c',
    preConfirm: function() {
      var input = document.getElementById('confirmText');
      if (!input || input.value !== 'RESET') {
        Swal.showValidationMessage('Ketik "RESET" untuk konfirmasi');
        return false;
      }
      return true;
    }
  });
  
  if (!confirm.isConfirmed) return;
  
  Swal.fire({
    title: 'Meriset & Mengunduh...',
    text: 'Menghapus data lama...',
    allowOutsideClick: false,
    didOpen: function() { Swal.showLoading(); }
  });
  
  try {
    // Simpan data user yang login SEBELUM reset
    var currentUserId = localStorage.getItem("offline_user_id");
    var currentUserEmail = localStorage.getItem("offline_user_email");
    var currentUserName = localStorage.getItem("offline_user_name");
    var currentUserRole = localStorage.getItem("offline_user_role");
    
    console.log('📝 Menyimpan data user sebelum reset:', { 
      userId: currentUserId, 
      name: currentUserName, 
      role: currentUserRole 
    });
    
    // Hapus semua data
    await window.localDB.clear('produk');
    await window.localDB.clear('transaksi');
    await window.localDB.clear('detail_transaksi');
    await window.localDB.clear('profiles');
    await window.localDB.clear('master_kelas');
    
    // Unduh ulang dari server (with kelas associations)
    var produkRes = await window.syncManager.fetchProdukWithKelas('*');
    var produkData = produkRes.data || [];
    for (var i = 0; i < produkData.length; i++) {
      await window.localDB.save('produk', produkData[i], produkData[i].id);
    }
    
    var kelasRes = await sb.from('master_kelas').select('*');
    var kelasData = kelasRes.data || [];
    for (var j = 0; j < kelasData.length; j++) {
      await window.localDB.save('master_kelas', kelasData[j], kelasData[j].id);
    }
    
    // Unduh profiles dari server
    var profilRes = await sb.from('profiles').select('*');
    var profilData = profilRes.data || [];
    for (var k = 0; k < profilData.length; k++) {
      await window.localDB.save('profiles', profilData[k], profilData[k].id);
    }
    
    // ========== TAMBAHAN: UNDUH SEMUA TRANSAKSI DAN DETAIL ==========
    var transaksiRes = await sb.from('transaksi').select('*, detail_transaksi(*)').order('created_at', { ascending: false });
    var transaksiData = transaksiRes.data || [];
    for (var t = 0; t < transaksiData.length; t++) {
      await window.localDB.save('transaksi', transaksiData[t], transaksiData[t].id);
      if (transaksiData[t].detail_transaksi && Array.isArray(transaksiData[t].detail_transaksi)) {
        for (var dt = 0; dt < transaksiData[t].detail_transaksi.length; dt++) {
          await window.localDB.save('detail_transaksi', transaksiData[t].detail_transaksi[dt], transaksiData[t].detail_transaksi[dt].id);
        }
      }
    }
    console.log('✅ Unduh Transaksi dari server:', transaksiData.length);
    
    // ===== PENTING: KEMBALIKAN DATA USER YANG LOGIN =====
    if (currentUserId) {
      // Cari profile user yang sedang login dari data yang baru diunduh
      var userProfile = profilData.find(function(p) { return p.id === currentUserId; });
      
      if (userProfile) {
        // Update localStorage dengan data terbaru dari server
        localStorage.setItem("offline_user_id", userProfile.id);
        localStorage.setItem("offline_user_name", userProfile.nama || currentUserName);
        localStorage.setItem("offline_user_role", userProfile.role || 'kasir');
        
        console.log('✅ Role user dipulihkan dari server:', userProfile.role);
      } else {
        // Jika profile tidak ditemukan di server, buat ulang
        var { data: authUser } = await sb.auth.getUser();
        if (authUser && authUser.user) {
          var newProfile = {
            id: authUser.user.id,
            nama: currentUserName || authUser.user.email,
            role: currentUserRole || 'kasir',
            created_at: new Date().toISOString(),
            updated_at: new Date().toISOString(),
            synced_at: new Date().toISOString()
          };
          
          // Simpan ke Supabase
          await sb.from('profiles').upsert(newProfile, { onConflict: 'id' });
          
          // Simpan ke localStorage
          localStorage.setItem("offline_user_id", newProfile.id);
          localStorage.setItem("offline_user_name", newProfile.nama);
          localStorage.setItem("offline_user_role", newProfile.role);
          
          // Simpan ke IndexedDB
          await window.localDB.save('profiles', newProfile, newProfile.id);
          
          console.log('✅ Profile user dibuat ulang:', newProfile);
        }
      }
    }
    
    Swal.close();
    const now = new Date().toISOString();
    localStorage.setItem('last_sync_produk', now);
    localStorage.setItem('last_sync_kelas', now);
    localStorage.setItem('last_sync_transaksi', now);
    localStorage.setItem('last_full_sync', now);
    localStorage.removeItem('pending_updates');

    Swal.fire({
      icon: 'success',
      title: 'Reset & Unduh Selesai!',
      text: 'Data berhasil direset dan diunduh ulang. Role Anda tetap ' + (localStorage.getItem("offline_user_role") === 'admin' ? 'Admin' : 'Kasir'),
      timer: 2000,
      showConfirmButton: false
    });
    
    setTimeout(function() { location.reload(); }, 2000);
    
  } catch(error) {
    Swal.close();
    Swal.fire({
      icon: 'error',
      title: 'Reset Gagal',
      text: error.message,
      confirmButtonText: 'Tutup'
    });
  }
}

// ============================================
// INITIALIZE APP - DENGAN SYNC NOTIFICATION
// ============================================
(function() {
  // Panggil fungsi async segera
  (async function initializeApp() {
    try {
      var isOnline = navigator.onLine;
      console.log('🚀 Starting app initialization... (online:', isOnline + ')');
      
      // 1. Refresh role dari server (hanya jika online)
      if (isOnline) {
        try {
          const { data: { user } } = await sb.auth.getUser();
          if (user) {
            const { data: profile } = await sb
              .from('profiles')
              .select('role, nama')
              .eq('id', user.id)
              .maybeSingle();
            
            if (profile) {
              localStorage.setItem("offline_user_role", profile.role);
              localStorage.setItem("offline_user_name", profile.nama);
              localStorage.setItem("offline_user_id", user.id);
            }
          }
        } catch(e) {
          console.warn('Refresh role error:', e);
        }
      }
      
      // 2. Ambil data user dari localStorage
      var userId = localStorage.getItem("offline_user_id");
      var userName = localStorage.getItem("offline_user_name") || "User";
      var userRole = localStorage.getItem("offline_user_role") || "kasir";
      
      // 3. Set global variables
      window.currentUser = { id: userId };
      window.currentRole = userRole;
      window.currentUserRole = userRole;
      window.currentUserName = userName;
      
      // 4. Tampilkan di UI
      const namaElement = document.getElementById("namaUser");
      const roleElement = document.getElementById("roleUser");
      const menuNameElement = document.getElementById("userMenuName");
      
      if (namaElement) namaElement.innerText = userName;
      if (roleElement) roleElement.innerText = userRole === 'admin' ? 'Administrator' : 'Kasir';
      if (menuNameElement) menuNameElement.innerText = userName;
      
      // 5. Sembunyikan menu admin jika role bukan admin
      const adminMenus = ['menu-role', 'menu-data', 'menu-admin-devices', 'menu-master-kelas'];
      for (var i = 0; i < adminMenus.length; i++) {
        var el = document.getElementById(adminMenus[i]);
        if (el) {
          el.style.display = (userRole === 'admin') ? 'flex' : 'none';
        }
      }
      
      // 5b. Kasir hanya lihat: Kasir, Laporan, Laporan Master (sembunyikan Dashboard, Produk)
      if (userRole !== 'admin') {
        const kasirHiddenMenus = ['menu-dashboard', 'menu-produk'];
        for (var j = 0; j < kasirHiddenMenus.length; j++) {
          var kel = document.getElementById(kasirHiddenMenus[j]);
          if (kel) kel.style.display = 'none';
        }
      }
      
      // 6. Inisialisasi database offline
      if (window.localDB && window.localDB.initDB) {
        await window.localDB.initDB();
      }
      
      // 7. Inisialisasi offline core
      if (window.offlineCore && window.offlineCore.init) {
        await window.offlineCore.init();
      }
      
      // 8. Populate kelas map globally (dari lokal saja, cepat)
      if (typeof refreshKelasData === 'function') {
        await refreshKelasData();
      }
      
      // 9. Cek data awal — hanya sync jika online DAN cache kosong
      var produk = [];
      if (window.localDB && window.localDB.getAll) {
        produk = await window.localDB.getAll('produk') || [];
      }
      
      if (produk.length === 0 && isOnline) {
        var loadingToast = document.createElement('div');
        loadingToast.className = 'sync-toast';
        loadingToast.innerHTML = '<i class="fas fa-sync fa-spin"></i> Menyiapkan data offline...';
        document.body.appendChild(loadingToast);
        setTimeout(function() { loadingToast.classList.add('show'); }, 10);
        
        if (window.offlineCore && window.offlineCore.syncAll) {
          await window.offlineCore.syncAll();
        }
        
        loadingToast.classList.remove('show');
        setTimeout(function() {
          if (loadingToast.parentNode) loadingToast.parentNode.removeChild(loadingToast);
        }, 300);
      }
      
      // 10. Load halaman sesuai role
      if (userRole === 'admin') {
        if (typeof loadDashboard === 'function') loadDashboard();
      } else {
        if (typeof loadKasir === 'function') loadKasir();
      }
      
      console.log('✅ App initialized, role:', userRole, '| produk:', produk.length);
      
      // ============================================
      // SYNC NOTIFICATION - SETELAH SEMUA INIT SELESAI
      // ============================================
      if (window.syncNotification) {
        console.log('🔔 Setting up sync notification...');
        
        // Tambahkan menu ke sidebar
        if (typeof window.syncNotification.addToSidebar === 'function') {
          window.syncNotification.addToSidebar();
        }
        
        // Cek update saat pertama kali buka (hanya admin, jika online)
        if (isOnline && userRole === 'admin') {
          setTimeout(function() {
            window.syncNotification.checkForUpdates().then(function(updates) {
              if (updates && updates.hasUpdates) {
                window.syncNotification.showUpdateNotification(updates);
              }
            }).catch(function(err) {
              console.warn('Check updates error:', err);
            });
          }, 3000);
        }
      } else {
        console.warn('⚠️ syncNotification not loaded');
      }
      
    } catch(error) {
      console.error('Init error:', error);
    }
  })();
})();
